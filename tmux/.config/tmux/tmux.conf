set -g mouse on
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#[fg=#{@thm_crust},bg=#{@thm_teal}] #H "
set -ag status-right "#[fg=#{@thm_crust},bg=#{@thm_flamingo}] session: #S "
set -ag status-right "#[fg=#{@thm_crust},bg=#{@thm_mauve}] CPU: #(top -l 1 | awk '/CPU usage/{print int($3+$5+0.5)}')%% "
set -ag status-right "#[fg=#{@thm_crust},bg=#{@thm_sky}] MEM: #(memory_pressure | awk '/free percentage/{v=$5; gsub(/[^0-9]/,\"\",v); print 100-v}')%% "

set -g focus-events on

set -g base-index 1 # start windows numbering at 1

unbind C-b
set -g prefix C-a
bind C-l send-keys 'C-l'

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'

# Smart Splits

set -g @plugin 'mrjones2014/smart-splits.nvim'

set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)

set -g @smart-splits_move_left_key  'C-h' # key-mapping for navigation.
set -g @smart-splits_move_down_key  'C-j' #  --"--
set -g @smart-splits_move_up_key    'C-k' #  --"--
set -g @smart-splits_move_right_key 'C-l' #  --"--

set -g @smart-splits_resize_left_key  'M-h' # key-mapping for resizing.
set -g @smart-splits_resize_down_key  'M-j' #  --"--
set -g @smart-splits_resize_up_key    'M-k' #  --"--
set -g @smart-splits_resize_right_key 'M-l' #  --"--

set -g @smart-splits_resize_step_size '3' # change the step-size for resizing.


# Catppuccin

set -g @plugin 'catppuccin/tmux#v2.3.0' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "basic"
# Show the window name (#W, what rename-window sets) instead of the pane title (#T).
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g @plugin 'alberti42/tmux-fzf-links'

set -g @plugin 'sainnhe/tmux-fzf'

# Keep at very bottom
run '~/.config/tmux/plugins/tpm/tpm'

set -gF message-style "fg=#{@thm_teal},bg=#{@thm_overlay_0},fill=#{@thm_overlay_0}"
set -gF message-command-style "fg=#{@thm_teal},bg=#{@thm_overlay_0},fill=#{@thm_overlay_0}"
